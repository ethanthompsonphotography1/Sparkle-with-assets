
name: sparkle_squad
description: "A high-performance mobile game skeleton in Flutter titled \"Sparkle-Squad: Neon-Saur Adventures.\""

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  rive: ^0.13.0
  audioplayers: ^5.0.0
  shared_preferences: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/rive/
    - assets/audio/
